<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDPHA — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'fidpha/css/login.css' %}">
</head>
<body>
    <div class="login-wrapper">

        <div class="login-brand">
            <div class="login-brand-icon">
                <span class="material-icons-round">local_pharmacy</span>
            </div>
            <div class="login-brand-title">FIDPHA</div>
            <div class="login-brand-sub">Pharmacy Management Portal</div>
        </div>

        <div class="login-card">
            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li>
                            <span class="material-icons-round" style="font-size:16px;">error_outline</span>
                            {{ message }}
                        </li>
                    {% endfor %}
                </ul>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="form-input-wrapper">
                        <span class="material-icons-round form-input-icon">person</span>
                        <input type="text" name="username" class="form-input" placeholder="Enter your username" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="form-input-wrapper">
                        <span class="material-icons-round form-input-icon">lock</span>
                        <input type="password" name="password" class="form-input" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span class="material-icons-round" style="font-size:18px;">login</span>
                    Sign In
                </button>

                <div style="text-align: center; margin-top: 16px;">
                    <a href="/accounts/password_reset/" style="font-size: 0.82rem; color: #94a3b8; text-decoration: none;">
                        Forgot your password?
                    </a>
                </div>
            </form>

            <!-- divider -->
            <div style="display: flex; align-items: center; gap: 10px; margin: 20px 0;">
                <div style="flex: 1; height: 1px; background-color: #334155;"></div>
                <span style="font-size: 0.78rem; color: #475569;">or</span>
                <div style="flex: 1; height: 1px; background-color: #334155;"></div>
            </div>

            <!-- Google button -->
            <a href="/auth/google/login/" class="google-btn">
    <svg width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        <path fill="none" d="M0 0h48v48H0z"/>
    </svg>
    Continue with Google
</a>

        </div>

        <div class="login-footer">
            FIDPHA © 2026 — Pharmacy Management System
        </div>

    </div>
</body>
</html>
