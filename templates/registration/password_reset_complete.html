{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDPHA — Password Reset Complete</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'fidpha/css/login.css' %}">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="login-brand-icon">
                <span class="material-icons-round">local_pharmacy</span>
            </div>
            <div class="login-brand-title">FIDPHA</div>
            <div class="login-brand-sub">Password reset complete</div>
        </div>

        <div class="login-card" style="text-align: center;">
            <div style="width: 52px; height: 52px; background-color: rgba(34,197,94,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                <span class="material-icons-round" style="color: #22c55e; font-size: 26px;">check_circle</span>
            </div>
            <p style="font-size: 0.95rem; font-weight: 600; color: #f1f5f9; margin-bottom: 8px;">Password updated!</p>
            <p style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px;">
                Your password has been successfully reset. You can now log in with your new password.
            </p>
            <a href="/portal/login/" class="login-btn" style="display: inline-flex; text-decoration: none;">
                <span class="material-icons-round" style="font-size:18px;">login</span>
                Back to Login
            </a>
        </div>

        <div class="login-footer">
            FIDPHA © 2026 — Pharmacy Management System
        </div>
    </div>
</body>
</html>
