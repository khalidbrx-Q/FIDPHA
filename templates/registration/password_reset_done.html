{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinInPharma — Email Sent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'fidpha/css/login.css' %}">
    <script src="{% static 'fidpha/js/portal.js' %}"></script>
</head>
<body>

    <div class="login-wrapper">

        <div class="login-brand">
            <div class="login-brand-icon">
                <span class="material-icons-round">mark_email_read</span>
            </div>
            <div class="login-brand-title">WinInPharma</div>
            <div class="login-brand-sub">Check your inbox</div>
        </div>

        <div class="login-card" style="text-align:center;">
            <div style="width:52px; height:52px; background-color:rgba(34,197,94,0.15); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
                <span class="material-icons-round" style="color:#22c55e; font-size:26px;">mark_email_read</span>
            </div>
            <p style="font-size:0.95rem; font-weight:600; color:var(--text-primary); margin-bottom:8px;">Email sent!</p>
            <p style="font-size:0.85rem; color:var(--text-secondary); margin-bottom:20px;">
                We've sent a password reset link to your email. Check your inbox and follow the instructions.
            </p>
            <a href="/portal/login/" class="back-link">← Back to Login</a>

            <div class="theme-toggle-row">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span class="material-icons-round" id="theme-icon">light_mode</span>
                    <span id="theme-label">Light mode</span>
                </button>
            </div>
        </div>

        <div class="login-footer">
            WinInPharma © 2026 — Pharmacy Management System
        </div>

    </div>
</body>
</html>
